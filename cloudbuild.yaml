# Cloud Build: build the container, push to Artifact Registry, deploy as a Cloud Run Job.
# Trigger on push to main. Substitute _REGION and _REPO as needed.
#
# Required substitutions (set at trigger level):
#   _REGION          e.g. asia-southeast1
#   _REPO            Artifact Registry repo name, e.g. ssot
#   _JOB_NAME        Cloud Run Job name, e.g. ssot-daily
#   _GCP_PROJECT     Project ID where BQ lives (can equal $PROJECT_ID)
#   _SA_EMAIL        Runtime SA for the job, e.g. ssot-runner@PROJECT.iam.gserviceaccount.com

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/ssot:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/ssot:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/ssot

  - id: deploy-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run jobs deploy ${_JOB_NAME} \
          --region=${_REGION} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/ssot:$SHORT_SHA \
          --service-account=${_SA_EMAIL} \
          --task-timeout=3600 \
          --max-retries=1 \
          --cpu=1 --memory=1Gi \
          --set-env-vars=GCP_PROJECT=${_GCP_PROJECT},BQ_LOCATION=${_REGION},LOG_LEVEL=INFO \
          --set-secrets=SUPERMETRICS_API_KEY=SUPERMETRICS_API_KEY:latest \
          --command=ssot --args=run

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/ssot

options:
  logging: CLOUD_LOGGING_ONLY
