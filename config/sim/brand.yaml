# Elysium Home Care — fictional SEA CPG archetype (Unilever-style, home care +
# personal care heavy). 4 categories × 8 SKUs = 32 SKUs. Prices in SGD; per-market
# multipliers applied on top of FX to reflect local shelf pricing realities.

