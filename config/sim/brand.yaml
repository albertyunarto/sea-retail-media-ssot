    # LAUNDRY — ~30% of brand GMV
    # -------------------------------------------------------------------------
    - id: laundry
      name: Laundry
      base_demand_share: 0.30
      skus:
        - { sku_id: ELY-LAU-0001, name: "Elysium Detergent Powder 800g",    category: laundry, unit_price_sgd: 6.50,  margin_pct: 0.35, lifecycle: mature }
